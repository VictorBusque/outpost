name: CI

# Runs on every PR (and as a push guard on main), enforcing the same three
# gates used locally (AGENTS.md "Local development"): format check, lint,
# strict type check, and the unit suite. All must pass before a PR can merge
# (required status checks live on the `main` branch protection).

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same PR/ref so force-pushes and amended
# commits don't queue stale jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: lint + type-check + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --no-progress

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check (ty, strict)
        run: uv run ty check .

      - name: Tests
        run: uv run pytest
